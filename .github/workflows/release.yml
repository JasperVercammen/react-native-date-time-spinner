name: "🚀 release"

on:
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to release"
                required: true
                default: "main"

permissions:
    id-token: write # Required for OIDC
    contents: write

jobs:
    release:
        name: 🚀 release
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch }}
                  fetch-depth: 0
            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version-file: .nvmrc
                  registry-url: https://registry.npmjs.org
            - name: Update npm
              # Pin to npm 11 (OIDC/provenance-capable). npm@latest (12.0.0) ships a
              # broken global install missing its bundled `sigstore` module, which
              # crashes `npm publish` provenance with "Cannot find module 'sigstore'".
              run: npm install -g npm@11
            - name: Install dependencies
              run: yarn
            - name: Release
              run: npm publish
            - name: Merge current branch into main
              if: github.event.inputs.branch != 'main'
              uses: devmasx/merge-branch@master
              with:
                  head_branch: ${{ github.event.inputs.branch }}
                  target_branch: main
                  commit_message: "chore: merge release into main"
